version: "3"
services:
  scienest:
    build:
      context: ./
    image: rokoucha/scienest
    ports:
      - "3000:3000"

  postgres:
    environment:
      POSTGRES_USER: scienest
      POSTGRES_PASSWORD: scienest
      POSTGRES_DB: scienest
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    image: postgres:12-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  adminer:
    image: adminer
    ports:
      - "8080:8080"

volumes:
  postgres-data:
    driver: local
